name: Release AAB

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest

    env:
      GRADLE_USER_HOME: /home/runner/.gradle

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK (compileSdk 35)
        uses: android-actions/setup-android@v2
        with:
          api-level: 35
          build-tools: 35.0.0

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-release-${{ hashFiles('**/gradle/wrapper/gradle-wrapper.properties', '**/build.gradle*', '**/settings.gradle*', '**/settings.gradle.kts', 'gradle/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-release-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Prepare signing (required for release)
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "❌ ERROR: KEYSTORE_BASE64 secret is not set. Release builds require signing."
            echo "Please add the KEYSTORE_BASE64 secret to GitHub repository settings."
            exit 1
          fi
          echo "✓ Decoding keystore from KEYSTORE_BASE64..."
          echo "$KEYSTORE_BASE64" | base64 --decode > ./keystore.jks
          ls -l ./keystore.jks
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Clean & Bundle Release (signed)
        run: |
          ./gradlew --no-daemon -Porg.gradle.jvmargs='-Xmx3g' \
            -Pandroid.injected.signing.store.file=./keystore.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }} \
            clean bundleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Find AAB
        id: find_aab
        run: |
          AAB=$(find app/build/outputs -type f -name "*.aab" | head -n 1 || true)
          if [ -z "$AAB" ]; then
            echo "No AAB found" >&2
            exit 1
          fi
          echo "aab=$AAB" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload AAB to Release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ steps.find_aab.outputs.aab }}
          asset_name: ${{ github.repository }}-${{ github.ref_name }}.aab
          asset_content_type: application/octet-stream

      - name: Upload AAB as workflow artifact (fallback)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aab-${{ github.ref_name }}
          path: ${{ steps.find_aab.outputs.aab }}

      - name: Stop Gradle
        run: ./gradlew --no-daemon --stop || true