name: Deploy to Google Play Store

on:
  workflow_dispatch:
    inputs:
      track:
        description: 'Release track (internal, alpha, beta, production)'
        required: true
        default: 'internal'
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production
      tag:
        description: 'Git tag to deploy (e.g., v1.0.0)'
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      GRADLE_USER_HOME: /home/runner/.gradle

    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK (compileSdk 35)
        uses: android-actions/setup-android@v2
        with:
          api-level: 35
          build-tools: 35.0.0

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-playstore-${{ hashFiles('**/gradle/wrapper/gradle-wrapper.properties', '**/build.gradle*', '**/settings.gradle*') }}
          restore-keys: |
            gradle-${{ runner.os }}-playstore-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Decode service account JSON
        run: |
          echo "$SERVICE_ACCOUNT_JSON_BASE64" | base64 --decode > ./service-account.json
          ls -l ./service-account.json
        env:
          SERVICE_ACCOUNT_JSON_BASE64: ${{ secrets.SERVICE_ACCOUNT_JSON_BASE64 }}

      - name: Validate service account secret
        run: |
          if [ ! -f ./service-account.json ]; then
            echo "❌ ERROR: service-account.json not created. SERVICE_ACCOUNT_JSON_BASE64 secret may be missing or invalid."
            exit 1
          fi

      - name: Setup Ruby (for fastlane)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.0'
          bundler-cache: true

      - name: Install fastlane
        run: gem install fastlane

      - name: Build release AAB (signed)
        run: |
          ./gradlew --no-daemon -Porg.gradle.jvmargs='-Xmx3g' \
            -Pandroid.injected.signing.store.file=./service-account.json \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }} \
            clean bundleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload to Play Store via fastlane
        run: |
          cd app && fastlane supply \
            --aab ./build/outputs/bundle/release/*.aab \
            --json_key_data ./service-account.json \
            --track ${{ github.event.inputs.track }} \
            --skip_upload_screenshots \
            --skip_upload_metadata
        env:
          LC_ALL: en_US.UTF-8
          LANG: en_US.UTF-8

      - name: Upload AAB as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: aab-playstore-${{ github.event.inputs.tag }}
          path: app/build/outputs/bundle/release/*.aab

      - name: Stop Gradle
        run: ./gradlew --no-daemon --stop || true
